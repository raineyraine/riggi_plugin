authors = ["raineyraine"]
license = "MIT"
name = "raineyraine/riggi_plugin"
version = "0.1.1"

[dependencies.vide]
repo = "centau/vide"
rev = "19eaeb4"

[dev_dependencies.pathfs]
name = "jiwonz/pathfs"
target = "lune"
version = "^0.6.0"

[dev_dependencies.rojo]
name = "pesde/rojo"
target = "lune"
version = "^7.5.1"

[dev_dependencies.scripts]
name = "pesde/scripts_rojo"
target = "lune"
version = "^0.2.0"

[engines]
lune = "^0.10.2"
pesde = "^0.7.0"

[indices]
default = "https://github.com/pesde-pkg/index"

[patches."centau/vide"]
"0.0.0-242a44838807170ca4a4905a277139dd8cee37d1 roblox" = "patches/centau+vide-0.0.0-242a44838807170ca4a4905a277139dd8cee37d1+roblox.patch"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[target]
environment = "roblox"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"
