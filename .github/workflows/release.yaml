name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup rokit
        uses: CompeyDev/setup-rokit@v0.2.1

      - name: Install dependencies
        run: |
          pesde install

      - name: Setup lune
        run: |
          lune setup

      - name: Build
        run: |
          lune run build

      - name: "Generate changelog"
        id: gen_changelog
        run: |
          CHANGELOG_RESULT=$(lune run generate_changelog ${{ github.ref_name }})

          echo "changelog=$CHANGELOG_RESULT" >> $GITHUB_OUTPUT

      - name: "Commit changes"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: changelog for ${{ github.ref_name }}" || echo "No changes to commit"
          git git push origin HEAD:main

      - name: Upload assets
        uses: softprops/action-gh-release@v3
        with:
          working_directory: plugin
          files: plugin.rbxm
          body: ${{ steps.gen_changelog.outputs.changelog }}
