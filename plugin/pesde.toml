name = "raineyraine/riggi_plugin"
version = "0.1.0"
authors = ["raineyraine"]
license = "MIT"

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
vide = { repo = "centau/vide", rev = "19eaeb4" }
riggi_perdere_loader = { workspace = "raineyraine/riggi_perdere_loader", version = "^" }

[patches]
"centau/vide" = { "0.0.0-242a44838807170ca4a4905a277139dd8cee37d1 roblox" = "patches/centau+vide-0.0.0-242a44838807170ca4a4905a277139dd8cee37d1+roblox.patch" }
